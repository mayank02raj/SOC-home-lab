title: Suspicious Scheduled Task Created
id: 3c4d5e6f-7a8b-9c0d-1e2f-3a4b5c6d7e8f
status: experimental
description: |
  Detects scheduled task creation pointing at binaries in user-writable or
  unusual locations (Temp, AppData, Public, ProgramData root). A common
  persistence technique for commodity malware and APT operators alike.
author: Mayank Raj
date: 2026/04/07
references:
  - https://attack.mitre.org/techniques/T1053/005/
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: "\\schtasks.exe"
    CommandLine|contains: "/create"
  suspicious_path:
    CommandLine|contains:
      - "\\AppData\\"
      - "\\Temp\\"
      - "\\Public\\"
      - "\\ProgramData\\"
      - "\\Users\\Public\\"
      - "%APPDATA%"
      - "%TEMP%"
  condition: selection and suspicious_path
fields:
  - User
  - CommandLine
  - ParentImage
falsepositives:
  - Software installers that legitimately drop tasks in ProgramData
level: high
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1053.005
