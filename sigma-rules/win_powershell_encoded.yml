title: PowerShell Encoded Command Execution
id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: stable
description: |
  Detects PowerShell processes launched with the -EncodedCommand flag (or its
  abbreviations -enc, -e). Base64-encoded commands are a hallmark of fileless
  malware and offensive frameworks like Empire, Covenant, and Cobalt Strike.
author: Mayank Raj
date: 2026/04/07
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - "\\powershell.exe"
      - "\\pwsh.exe"
  selection_flag:
    CommandLine|contains:
      - " -enc "
      - " -EncodedCommand "
      - " -e "
      - " -ec "
  filter_legit:
    ParentImage|endswith:
      - "\\sccm\\bin\\ccmexec.exe"
  condition: selection_image and selection_flag and not filter_legit
fields:
  - User
  - CommandLine
  - ParentImage
  - ProcessId
falsepositives:
  - Legitimate admin scripts wrapped by deployment tooling
  - SCCM and similar management agents
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
