title: Reverse Shell Payload in HTTP Body
id: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f9a0b1c2d
status: stable
description: Common reverse shell command patterns inside HTTP request bodies
author: Mayank Raj
date: 2026/04/07
logsource:
  category: webserver
detection:
  selection:
    http_body|contains:
      - "bash -i >& /dev/tcp/"
      - "nc -e /bin/sh"
      - "python -c 'import socket"
      - "perl -e 'use Socket"
      - "/bin/sh -i"
  condition: selection
fields: [src_ip, dest_ip, http_body]
level: critical
tags:
  - attack.execution
  - attack.t1059.004
