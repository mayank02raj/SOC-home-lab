# TheHive 5 application.conf
# Connects to Cortex for observable enrichment and forwards alerts from Wazuh.

play.http.secret.key = "change-me-in-production-this-is-the-lab"

db.janusgraph {
  storage.backend = berkeleyje
  storage.directory = /opt/thp/thehive/data/database
  index.search.backend = lucene
  index.search.directory = /opt/thp/thehive/data/index
}

storage {
  provider = localfs
  localfs.location = /opt/thp/thehive/data/files
}

# Cortex integration for observable enrichment
cortex {
  servers = [
    {
      name = "cortex-soc-lab"
      url = "http://cortex:9001"
      auth { type = "bearer", key = "REPLACE_WITH_CORTEX_API_KEY" }
      includedTheHiveOrganisations = ["*"]
      excludedTheHiveOrganisations = []
    }
  ]
}

# MISP integration (optional, requires running MISP instance)
misp {
  interval = 1 hour
  servers = []
}

# Email notifications off in lab
notification.webhook.endpoints = []

# Authentication: local for the lab, swap to LDAP/OIDC for production
auth {
  providers = [
    { name = session },
    { name = basic, realm = thehive },
    { name = local },
    { name = key }
  ]
}
